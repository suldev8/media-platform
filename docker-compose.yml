version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: media_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  app:
    build: .
    image: media-platform:local
    ports:
      - "8080:8080"
    environment:
      # Spring datasource - point to the postgres service in this compose network
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/media_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      # OpenSearch (matches application.yml property name app.opensearch.url)
      APP_OPENSEARCH_URL: http://opensearch:9200
      # Optional: bind server port from env
      PORT: "8080"
      # DB host/port for Dockerfile wait loop
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      - postgres
      - redis
      - opensearch
    restart: on-failure
