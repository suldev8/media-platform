server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/media_platform
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  opensearch:
    url: http://localhost:9200

springdoc:
  swagger-ui:
    path: /swagger-ui.html

